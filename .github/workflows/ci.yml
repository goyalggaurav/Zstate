name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  track-a:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Matches local dev (Python.framework 3.14). Keep in sync with
          # the version warning in scripts/ci_parity.sh.
          python-version: "3.14"

      - name: CI parity script (smoke + validators, no live API)
        run: bash scripts/ci_parity.sh
